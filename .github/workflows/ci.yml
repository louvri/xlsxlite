name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=1 -benchtime=3s ./...

  gcs-build:
    name: Build GCS submodule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build GCS module
        working-directory: gcs
        run: go build ./...

  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: [lint, test, gcs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -v '^gcs/' | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Check if gcs module changed
        id: gcs
        run: |
          LATEST_GCS=$(git tag -l 'gcs/v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_GCS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=gcs/v0.1.0" >> "$GITHUB_OUTPUT"
          else
            if git diff --quiet "$LATEST_GCS" HEAD -- gcs/; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              GCS_MAJOR=$(echo "${LATEST_GCS#gcs/}" | cut -d. -f1)
              GCS_MINOR=$(echo "${LATEST_GCS#gcs/}" | cut -d. -f2)
              GCS_PATCH=$(echo "${LATEST_GCS#gcs/}" | cut -d. -f3)
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "tag=gcs/${GCS_MAJOR}.${GCS_MINOR}.$((GCS_PATCH + 1))" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create core tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create core release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      - name: Create GCS tag
        if: steps.gcs.outputs.changed == 'true'
        run: |
          git tag -a "${{ steps.gcs.outputs.tag }}" -m "Release ${{ steps.gcs.outputs.tag }}"
          git push origin "${{ steps.gcs.outputs.tag }}"

      - name: Create GCS release
        if: steps.gcs.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gcs.outputs.tag }}
          name: ${{ steps.gcs.outputs.tag }}
          generate_release_notes: true
